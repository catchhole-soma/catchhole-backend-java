name: Deploy EC2

on:
  workflow_run:
    workflows:
      - Publish Backend Image
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          set -euo pipefail

          if [ -z "$EC2_HOST" ]; then
            echo "::error::EC2_HOST secret is required."
            exit 1
          fi

          if [ -z "$EC2_SSH_KEY" ]; then
            echo "::error::EC2_SSH_KEY secret is required."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/catchhole-ec2
          chmod 600 ~/.ssh/catchhole-ec2
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose files
        run: |
          set -euo pipefail

          EC2_USER="${EC2_USER:-ubuntu}"
          EC2_DEPLOY_PATH="${EC2_DEPLOY_PATH:-/opt/catchhole}"
          REMOTE="${EC2_USER}@${EC2_HOST}"

          ssh -i ~/.ssh/catchhole-ec2 "$REMOTE" "mkdir -p '$EC2_DEPLOY_PATH'"
          scp -i ~/.ssh/catchhole-ec2 \
            deploy/compose.prod.yml deploy/Caddyfile \
            "$REMOTE:$EC2_DEPLOY_PATH/"

      - name: Deploy
        run: |
          set -euo pipefail

          EC2_USER="${EC2_USER:-ubuntu}"
          EC2_DEPLOY_PATH="${EC2_DEPLOY_PATH:-/opt/catchhole}"
          REMOTE="${EC2_USER}@${EC2_HOST}"

          if [ -n "$GHCR_READ_TOKEN" ]; then
            GHCR_USERNAME="${GHCR_USERNAME:-$GITHUB_ACTOR}"
            printf '%s' "$GHCR_READ_TOKEN" \
              | ssh -i ~/.ssh/catchhole-ec2 "$REMOTE" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          fi

          ssh -i ~/.ssh/catchhole-ec2 "$REMOTE" "
            set -euo pipefail
            cd '$EC2_DEPLOY_PATH'
            test -f .env
            docker compose --env-file .env -f compose.prod.yml pull
            docker compose --env-file .env -f compose.prod.yml up -d
            docker compose --env-file .env -f compose.prod.yml ps
            curl -fsS https://api.catchhole.com/actuator/health
          "
