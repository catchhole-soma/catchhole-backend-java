name: 기능 요청
description: 새로운 기능, API, 도메인 작업을 제안합니다.
title: "[Feature] "
body:
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 이 기능이 필요한 맥락이나 해결하려는 문제를 작성해주세요.
      placeholder: 예) 공고 분석 결과를 사용자에게 조회 API로 제공해야 합니다.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 요구사항
      description: 구현되어야 하는 동작을 구체적으로 작성해주세요.
      placeholder: |
        - 사용자는 분석 결과 목록을 조회할 수 있다.
        - 분석 결과는 최신순으로 정렬된다.
        - 인증되지 않은 사용자는 접근할 수 없다.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 어떤 조건을 만족하면 이슈를 완료로 볼 수 있는지 작성해주세요.
      placeholder: |
        - [ ] API 응답이 `CommonResponse` 규약을 따른다.
        - [ ] 관련 Service 테스트가 통과한다.
        - [ ] Swagger 문서에서 확인할 수 있다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 포함할 작업과 제외할 작업이 있다면 구분해서 작성해주세요.
    validations:
      required: false

  - type: input
    id: related
    attributes:
      label: 관련 이슈
      description: 관련 Jira, PR, GitHub Issue 링크를 작성해주세요.
      placeholder: 예) NVM-123, #12
    validations:
      required: false
