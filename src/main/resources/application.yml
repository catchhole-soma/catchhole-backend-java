spring:
  application:
    name: CatchHole-Backend
  profiles:
    active: local

# 개발 기본값. prod에서는 환경변수로 override.
cors:
  allowed-origins:
    - http://localhost:3000

storage:
  s3:
    bucket: ${AWS_S3_BUCKET:catchhole-local}
    region: ${AWS_REGION:ap-northeast-2}
    endpoint-override: ${AWS_S3_ENDPOINT_OVERRIDE:}

auth:
  jwt:
    # local 개발용 기본값. prod에서는 JWT_SECRET 환경변수로 override.
    secret: local-development-jwt-secret-must-be-at-least-32-bytes-long
    access-token-expiration: 30m
  refresh-token-expiration: 14d
  cookie:
    secure: false
    same-site: Lax
