spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  forward-headers-strategy: framework

auth:
  jwt:
    secret: ${JWT_SECRET}
  cookie:
    secure: true

internal:
  api-key: ${INTERNAL_API_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    root: INFO
